name: Build and Release Theme

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: npm run dist

      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: twentytwentyfive-child-zip
          path: dist/twentytwentyfive-child.zip
          if-no-files-found: error
          retention-days: 14

  release:
    # Tag pushes are the single release path. Published-release events are intentionally
    # not handled here to avoid duplicate builds/uploads for the same version.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release package
        uses: actions/download-artifact@v7
        with:
          name: twentytwentyfive-child-zip

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: twentytwentyfive-child.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
